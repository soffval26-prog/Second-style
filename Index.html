<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fashion Day Shop</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            text-align: center;
        }
        header {
            background-color: #ff7aa2;
            color: white;
            padding: 20px;
        }
        .product {
            background: white;
            margin: 20px;
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
            width: 200px;
        }
        img {
            width: 100%;
            border-radius: 10px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<header>
    <h1>Fashion Day Shop</h1>
    <p>Buy your favorite clothes!</p>
</header>

<div class="product">
    <img src="https://via.placeholder.com/200" alt="T-shirt">
    <h3>T-shirt</h3>
    <p>$10</p>
    <button>Buy</button>
</div>

<div class="product">
    <img src="https://via.placeholder.com/200" alt="Jeans">
    <h3>Jeans</h3>
    <p>$20</p>
    <button>Buy</button>
</div>

<div class="product">
    <img src="https://via.placeholder.com/200" alt="Jacket">
    <h3>Jacket</h3>
    <p>$25</p>
    <button>Buy</button>
</div>

</body>
</html>
